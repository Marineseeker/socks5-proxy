level: 'info'
development: false
encoding: 'console'
outputPaths:
  - 'stdout'
  - 'logs/app.log'
errorOutputPaths:
  - 'stderr'
encoderConfig:
  messageKey: 'msg'
  levelKey: 'level'
  timeKey: 'ts'
  nameKey: 'logger'
  callerKey: 'caller'
  stacktraceKey: 'stacktrace'
  lineEnding: "\n"
  levelEncoder: 'capitalColor'
  timeEncoder: 'iso8601'
  durationEncoder: 'string'
  callerEncoder: 'short'

kafka:
  brokers:
    - '192.168.191.128:9092'
  topic: 'byte-count'
  queue_size: 10000
