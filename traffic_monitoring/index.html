<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <title>Traffic Metrics</title>
    <style>
      body {
        margin: 0;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei",
          sans-serif;
        background: #f6f8fa;
        color: #24292f;
      }

      main {
        max-width: 760px;
        margin: 80px auto;
        padding: 32px;
        background: #fff;
        border: 1px solid #d0d7de;
        border-radius: 12px;
        box-shadow: 0 8px 24px rgba(140, 149, 159, 0.2);
      }

      h1 {
        margin-top: 0;
        font-size: 28px;
      }

      code {
        padding: 2px 6px;
        background: #f6f8fa;
        border: 1px solid #d0d7de;
        border-radius: 6px;
      }

      .note {
        padding: 16px;
        background: #fff8c5;
        border: 1px solid #d4a72c;
        border-radius: 8px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Traffic Metrics</h1>
      <p class="note">旧版浏览器实时监控接口已移除。</p>
      <p>
        当前 metrics 包按配置的聚合周期统计每个客户端的上传/下载流量，并将
        <code>TrafficMetric</code> JSON 消息发送到 Kafka。
      </p>
    </main>
  </body>
</html>
